services:
  - type: web
    name: aegisops-api
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: services/api/Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: LIVE_WORKFLOW_RUNS_ENABLED
        value: "false"
      - key: LIVE_RUN_ADMIN_KEY
        sync: false
      - key: REQUIRE_HUMAN_APPROVAL
        value: "true"
      - key: MAX_AGENT_RUN_SECONDS
        value: "300"
      - key: MAX_AGENT_TOOL_CALLS
        value: "25"
      - key: MAX_AGENT_ESTIMATED_USD
        value: "1.00"
      - key: CONFIGURED_CONNECTORS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPA_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_DEFAULT_MODEL
        sync: false
      - key: SUPPORT_SYSTEM_API_BASE_URL
        sync: false
      - key: CRM_API_BASE_URL
        sync: false
      - key: KNOWLEDGE_BASE_API_BASE_URL
        sync: false
      - key: OBSERVABILITY_API_BASE_URL
        sync: false
      - key: DEPLOYMENTS_API_BASE_URL
        sync: false
