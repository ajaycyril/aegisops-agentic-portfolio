name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scaffold-check:
    name: Scaffold Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Validate workspace files
        run: |
          test -f README.md
          test -f pnpm-workspace.yaml
          test -f services/api/pyproject.toml
          test -f docs/architecture/01-system-architecture.md
          test -f docs/use-cases/README.md
