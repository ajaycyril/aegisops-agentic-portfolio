name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate web workspace
        run: |
          pnpm -r lint
          pnpm -r typecheck
          pnpm -r build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m venv services/api/.venv
          services/api/.venv/bin/python -m pip install --upgrade pip
          services/api/.venv/bin/python -m pip install -e "services/api[dev]"

      - name: Validate API
        run: |
          services/api/.venv/bin/pytest services/api/tests
          services/api/.venv/bin/ruff check services/api
          services/api/.venv/bin/mypy services/api/src services/api/tests

      - name: Validate docs
        run: node scripts/check-docs-placeholders.mjs
