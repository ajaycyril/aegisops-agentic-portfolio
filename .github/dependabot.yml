version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      web-runtime:
        patterns:
          - "@ai-sdk/*"
          - "@langchain/*"
          - "@modelcontextprotocol/*"
          - "ai"
          - "next"
          - "react*"
  - package-ecosystem: pip
    directory: /services/api
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
