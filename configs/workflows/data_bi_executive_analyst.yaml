id: data_bi_executive_analyst
name: Executive Analyst Agent
domain: data_bi
status: planned
enabled_when:
  connectors:
    - postgres
    - observability
  required_scopes:
    - analytics:read
    - traces:read
patterns:
  - text_to_sql_guarded
  - chart_generation
  - evaluator_optimizer
  - executive_summary
data_policy:
  fake_data_allowed: false
  replay_allowed_from_real_runs: true
  regex_business_extraction_allowed: false
default_autonomy: read_only
approval_required_for:
  - external_export
  - saved_report
visual_surfaces:
  - metric_tree
  - sql_lens
  - charts
  - insight_cards
