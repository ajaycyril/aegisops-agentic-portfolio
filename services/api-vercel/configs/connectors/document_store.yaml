id: document_store
name: Document Store
provider: vector_document_repository
category: knowledge
status: contract_ready
auth_type: connection_profile
required_env_vars:
  - DOCUMENT_STORE_CONNECTION_ID
supported_scopes:
  - controls:read
  - documents:read
tool_ids:
  - document_retrieval
workflow_ids:
  - compliance_audit_evidence
  - customer_support_escalation
  - finance_invoice_exception
  - hr_it_onboarding
  - sales_rfp_agent
data_boundaries:
  stores_personal_data: true
  stores_customer_data: true
  external_network_access: false
  permitted_data_classes:
    - source_document
    - citation_metadata
    - policy_document
