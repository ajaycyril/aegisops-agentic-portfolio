id: compliance_audit_evidence
name: Audit Evidence Agent
domain: compliance
status: planned
enabled_when:
  connectors:
    - github
    - document_store
    - deployment_platform
    - identity_provider
  required_scopes:
    - controls:read
    - documents:read
    - deployments:read
    - audit_exports:write
patterns:
  - evidence_collection
  - control_mapping
  - policy_gate
  - audit_packet_generation
data_policy:
  fake_data_allowed: false
  replay_allowed_from_real_runs: true
  regex_business_extraction_allowed: false
default_autonomy: draft_only
approval_required_for:
  - evidence_export
  - auditor_message
visual_surfaces:
  - control_matrix
  - evidence_board
  - gap_analysis
  - audit_packet
